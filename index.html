      content="Receipt tracking, warranty reminders, and expense tracking from photos—no bank link. Private receipt tracking app."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "name": "Snap Tag Track",
            "url": "https://www.snaptagtrack.com/",
            "logo": "https://www.snaptagtrack.com/SnapTagTrack_trans.png"
          },
          {
            "@type": "WebApplication",
            "name": "Snap Tag Track",
            "url": "https://www.snaptagtrack.com/",
            "applicationCategory": "FinanceApplication",
            "operatingSystem": "Web",
            "description": "Receipt and invoice capture, tagging, expense tracking, and warranty expiry reminders.",
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
          }
        ]
      }
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-00ZZ72SPM5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-00ZZ72SPM5');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        try {
          var h = window.location.hash.slice(1);
          if (h) {
            var hp = new URLSearchParams(h);
            var type = hp.get("type");
            if (type) sessionStorage.setItem("snap_auth_flow_type", type);
            if (
              h.indexOf("access_token=") !== -1 ||
              h.indexOf("refresh_token=") !== -1 ||
              hp.has("refresh_token")
            )
              sessionStorage.setItem("snap_auth_implicit_hash", "1");
          }
          var q = window.location.search.slice(1);
          if (q) {
            var qp = new URLSearchParams(q);
            var t2 = qp.get("type");
            if (t2) sessionStorage.setItem("snap_auth_flow_type", t2);
            if (qp.get("code")) sessionStorage.setItem("snap_auth_code_present", "1");
          }
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
